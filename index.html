<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bus Board</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">Live departures</p>
        <h1>When is my bus coming?</h1>
      </div>
      <div class="status" id="status">Starting…</div>
    </header>

    <section class="controls" id="routeControls" aria-label="Route selection"></section>
    <section class="cards" id="cards" aria-live="polite"></section>
  </main>

  <!-- After `sbt fastLinkJS`, this file is generated here. -->
  <script src="target/scala-3.3.3/bus-homepage-fastopt/main.js"></script>
</body>
</html>
